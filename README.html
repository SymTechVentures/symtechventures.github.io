<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['\\[', '\\]']]
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      },
      chtml: {
        scale: 1
      }
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <style>
html, body {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
    background: #212121 !important;
    color: #f5f5f5 !important;
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont,
        "Segoe UI", Helvetica, Arial, sans-serif !important;
    font-size: 16px !important;
    line-height: 1.75 !important;
    margin: 0 !important;
    padding: 10px !important;
}

p, li, blockquote, div {
    text-align: justify !important;
    text-justify: inter-word !important;
    hyphens: auto !important;
    -webkit-hyphens: auto !important;
    word-break: normal !important;
}

p {
    margin: 0 0 1.15em 0 !important;
}

p.list-label {
    margin: 0 0 0.05em 0 !important;
    line-height: 1.2 !important;
}

h1, h2, h3, h4, h5, h6 {
    color: #ffffff !important;
    text-align: left !important;
    font-weight: 600 !important;
    line-height: 1.25 !important;
}

h1:not(.doc-title) {
    text-align: center !important;
    font-size: 1.8em !important;
    line-height: 1.2 !important;
    margin: 0 !important;
    padding-top: 0.5em !important;
    padding-bottom: 0.8em !important;
    border-bottom: 2px solid #6a6a6a !important;
}

h1:not(.doc-title) + hr {
    display: none !important;
}

h2 {
    font-size: 1.7em !important;
    text-align: center !important;
    margin: 1.05em 0 1.15em 0 !important;
    padding: 0 !important;
    line-height: 1.2 !important;
}

hr {
    border: 0 !important;
    border-top: 2px solid #6a6a6a !important;
    margin: 0 !important;
    padding: 0 !important;
}

ul + hr,
ol + hr {
    margin-top: 1.1em !important;
}

hr + h1:not(.doc-title) {
    margin: 0 !important;
}

h1.doc-title {
    text-align: center !important;
    font-size: 2em !important;
    border-bottom: 2px solid #6a6a6a !important;
    padding-bottom: 0.5em !important;
    margin-bottom: 0.9em !important;
}

h3 { font-size: 1.35em !important; }

h4 { font-size: 1.15em !important; }

ul, ol {
    margin: 0.1em 0 0.2em 1.6em !important;
    padding: 0 !important;
}

strong + ul,
strong + ol {
    margin-top: 0.2em !important;
}

ul ul,
ul ol,
ol ul,
ol ol {
    margin-top: 0.2em !important;
    margin-bottom: 0.6em !important;
}

li > p:has(+ ul),
li > p:has(+ ol) {
    margin-bottom: 0.2em !important;
}

li {
    margin-bottom: 0 !important;
}

a {
    color: #8ab4f8 !important;
    text-decoration: none !important;
}

a:hover {
    text-decoration: underline !important;
}

strong {
    color: #ffffff !important;
    font-weight: 600 !important;
}

em {
    color: #f0f0f0 !important;
}

blockquote {
    margin: 1.2em 0 !important;
    padding-left: 1em !important;
    border-left: 3px solid #4a4a4a !important;
    color: #e7e7e7 !important;
}

code {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas,
        "Liberation Mono", monospace !important;
    background: #2f2f2f !important;
    color: #ffffff !important;
    padding: 0.15em 0.35em !important;
    border-radius: 4px !important;
    font-size: 0.95em !important;
}

pre {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas,
        "Liberation Mono", monospace !important;
    background: #2f2f2f !important;
    color: #ffffff !important;
    padding: 0.9em 1em !important;
    border-radius: 8px !important;
    overflow-x: auto !important;
    line-height: 1.5 !important;
    white-space: pre-wrap !important;
    text-align: left !important;
}

pre code {
    background: transparent !important;
    padding: 0 !important;
}

table {
    border-collapse: collapse !important;
    width: 100% !important;
    margin: 1.2em 0 !important;
    background: #212121 !important;
}

th, td {
    border: 1px solid #444 !important;
    padding: 8px 10px !important;
    vertical-align: top !important;
    text-align: left !important;
}

th {
    background: #2a2a2a !important;
    color: #ffffff !important;
}

img, figure {
    display: block !important;
    margin: 1em auto !important;
    max-width: 100% !important;
    height: auto !important;
    border: none !important;
    background: transparent !important;
}

figcaption {
    text-align: center !important;
    font-style: italic !important;
    margin-top: 0.35em !important;
    color: #dddddd !important;
}

p:has(+ ul),
p:has(+ ol) {
    margin-bottom: 0.15em !important;
}

.arithmatex,
.MathJax,
mjx-container {
    color: #ffffff !important;
}

p.doc-subtitle {
    text-align: center !important;
    color: #aaa !important;
    font-style: italic !important;
    margin-top: -0.5em !important;
    margin-bottom: 1.2em !important;
}
</style>
</head>
<body>
  <p>﻿# SymTech Ventures Website</p>
<p>This repository contains the official website for SymTech Ventures.</p>
<h2>Structure</h2>
<ul>
<li>index.html -&gt; main landing page</li>
<li>css/ -&gt; styles</li>
<li>js/ -&gt; scripts</li>
<li>pages/ -&gt; division pages</li>
<li>images/ -&gt; assets</li>
</ul>
<h2>Deployment</h2>
<p>Hosted via GitHub Pages.</p>
</body>
</html>
